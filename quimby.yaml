hosts:
  remote:
    type: ssh
    host: remote

runtimeProfiles:
  sbx-claude:
    runtime: sbx
    entrypoint: claude
    requiredTools:
      - claude
  sbx-codex:
    runtime: sbx
    entrypoint: codex
    requiredTools:
      - codex

roles:
  review:
    runtimeProfile: sbx-claude
    tmux: true
  review2:
    runtimeProfile: sbx-codex
    tmux: true
  builder:
    runtimeProfile: sbx-claude
    tmux: true
  builder2:
    runtimeProfile: sbx-claude
    tmux: true
  builder3:
    runtimeProfile: sbx-codex
    tmux: true
  integration:
    runtimeProfile: sbx-claude
    tmux: true

services:
  server: quimby serve

layouts:
  default:
    expr: ((review review2) | (builder builder2 integration)):80 / ($server host):20

default: default

presets:
  default:
    layout: default
    agents:
      review:
        role: review
        hostAlias: remote
      review2:
        role: review2
        hostAlias: remote
      builder:
        role: builder
        hostAlias: remote
      builder2:
        role: builder2
        hostAlias: remote
      builder3:
        role: builder3
        hostAlias: remote
      integration:
        role: integration
        hostAlias: remote
