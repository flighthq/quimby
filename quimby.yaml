hosts:
  remote:
    type: ssh
    host: remote

runtimeProfiles:
  claude-sbx:
    runtime: sbx
    entrypoint: claude
    requiredTools:
      - claude
  codex-sbx:
    runtime: sbx
    entrypoint: codex
    requiredTools:
      - codex

defaults:
  runtimeProfile: claude-sbx
  tmux: true
  hostAlias: remote

roles:
  review: {}
  builder: {}
  integration: {}

services:
  serve: quimby serve

layouts:
  default:
    expr: ((review review2) | (builder builder2 integration)):80 / (host $serve):20

default: default

presets:
  default:
    layout: default
    agents:
      review:
        role: review
      review2:
        role: review
        runtimeProfile: codex-sbx
      builder:
        role: builder
      builder2:
        role: builder
      builder3:
        role: builder
        runtimeProfile: codex-sbx
      integration:
        role: integration
