hosts:
  remote:
    type: ssh
    host: remote

runtimeProfiles:
  claude-sbx:
    runtime: sbx
    entrypoint: claude
    requiredTools:
      - claude
  codex-sbx:
    runtime: sbx
    entrypoint: codex
    requiredTools:
      - codex

defaults:
  runtimeProfile: claude-sbx
  tmux: true

roles:
  review: {}
  builder: {}
  integration: {}

services:
  server: quimby serve

layouts:
  default:
    expr: ((review review2) | (builder builder2 integration)):80 / (host $server):20

default: default

presets:
  default:
    layout: default
    agents:
      review:
        role: review
        hostAlias: remote
      review2:
        role: review
        runtimeProfile: codex-sbx
        hostAlias: remote
      builder:
        role: builder
        hostAlias: remote
      builder2:
        role: builder
        hostAlias: remote
      builder3:
        role: builder
        runtimeProfile: codex-sbx
        hostAlias: remote
      integration:
        role: integration
        hostAlias: remote
