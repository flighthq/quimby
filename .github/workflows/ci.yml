name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Build, Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI
        run: npm run ci

      # End-to-end harness. Each suite self-skips when its dependency is absent, so this is
      # safe on a bare runner: Suite A (git + built CLI) always runs; Suite B needs tmux;
      # Suite C needs passwordless loopback sshd. To exercise B and C fully, provision those
      # tools on the runner (e.g. `apt-get install -y tmux openssh-server` + a loopback key).
      - name: Integration tests
        run: npm run test:integration
